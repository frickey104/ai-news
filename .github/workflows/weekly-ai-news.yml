name: Weekly AI News Update

on:
  schedule:
    - cron: "0 0 * * 0" # 毎週日曜 00:00 UTC = 09:00 JST
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ─── Step 1: ニュース収集 & コミット ───────────────────────────
  collect:
    name: Collect AI News
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run collection script
        run: python scripts/collect_ai_news.py

      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: weekly AI news update $(date +'%Y-%m-%d') [skip ci]"
          git push

  # ─── Step 2: VitePress ビルド ─────────────────────────────────
  build:
    name: Build Site
    runs-on: ubuntu-latest
    needs: collect
    steps:
      - name: Checkout (latest after collect)
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress
        run: npm run docs:build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  # ─── Step 3: GitHub Pages デプロイ ───────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
